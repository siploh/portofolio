<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Action | Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .loading-spin {
      border: 3px solid #f3f3f3; border-top: 3px solid #ef4444; border-radius: 50%;
      width: 30px; height: 30px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .tr-hover:hover { background-color: #f8fafc; transition: all 0.2s; }
    
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: invert(0.5);
    }

    /* Animasi Modal */
    .modal-active { opacity: 1; pointer-events: auto; transform: scale(1); visibility: visible; }
    .modal-inactive { opacity: 0; pointer-events: none; transform: scale(0.95); visibility: hidden; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

  <div id="photoModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm transition-all duration-300 modal-inactive">
    <div class="relative max-w-2xl w-full bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
        <h3 id="modalTitle" class="text-xs font-black uppercase text-slate-800 tracking-widest italic">Detail Foto Bukti</h3>
        <button onclick="closePhotoModal()" class="bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-600 p-2 rounded-xl transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div class="p-4 bg-slate-50 flex justify-center items-center min-h-[300px]">
        <img id="modalImg" src="" alt="Bukti Kunjungan" class="max-h-[70vh] rounded-2xl shadow-lg border-4 border-white object-contain">
      </div>
    </div>
  </div>

  <div id="mapModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm transition-all duration-300 modal-inactive">
    <div class="relative max-w-4xl w-full bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
        <div>
          <h3 class="text-xs font-black uppercase text-slate-800 tracking-widest italic">Lokasi Check-in Terdeteksi</h3>
          <p id="mapSubtitle" class="text-[9px] text-slate-400 font-bold uppercase mt-1"></p>
        </div>
        <button onclick="closeMapModal()" class="bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-600 p-2 rounded-xl transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div class="w-full aspect-video bg-slate-100">
        <iframe id="mapFrame" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <nav class="bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-xl">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-red-600 p-2 rounded-lg shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
        </div>
        <h1 class="font-black uppercase tracking-widest text-lg">Field Action <span class="text-red-500 italic">Admin</span></h1>
      </div>
      <button onclick="loadData()" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl text-xs font-black transition-all active:scale-95 flex items-center gap-2 uppercase">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
        Sync
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6 space-y-8">
    
    <section>
      <div class="flex items-center justify-between mb-4 px-2">
        <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Monitoring Progress</h2>
        <span id="dateDisplay" class="text-[10px] font-bold text-slate-600 bg-white border border-slate-200 px-4 py-1.5 rounded-full uppercase shadow-sm italic tracking-widest">---</span>
      </div>
      <div id="summaryCards" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide">
        <div class="min-w-[240px] bg-white p-6 rounded-[2.5rem] border border-slate-200 animate-pulse">
          <div class="h-2 w-20 bg-slate-100 rounded mb-4"></div>
          <div class="h-8 w-16 bg-slate-100 rounded"></div>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
      
      <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
        <div>
          <h2 class="text-xs font-black uppercase text-slate-800 tracking-widest italic border-l-4 border-red-500 pl-3">History Kunjungan</h2>
        </div>
        
        <div class="flex items-center gap-3 w-full md:w-auto">
          <input type="date" id="filterTanggal" 
            class="w-full bg-slate-100 border-2 border-transparent focus:border-red-500 rounded-2xl px-5 py-2.5 text-[11px] font-black uppercase text-slate-700 outline-none transition-all"
            onchange="loadData()">
          <div id="totalVisitBadge" class="bg-slate-900 text-white px-5 py-3 rounded-2xl text-[10px] font-black whitespace-nowrap shadow-lg">0 VISIT</div>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50/50 border-b border-slate-200 text-[10px] font-black uppercase text-slate-500 tracking-[0.15em]">
              <th class="p-8">Sales</th>
              <th class="p-8">Toko / Outlet</th>
              <th class="p-8">Waktu</th>
              <th class="p-8">Titik GPS</th>
              <th class="p-8 text-center">Bukti</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwjTt6Jq6YvW92fdxo-2_FksA4FHzq1270BNi7OFcaW3p5OJjl9EWGt__NVXpCuLc-G1g/exec"; 

    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('filterTanggal').value = today;
      loadData();
    };

    function openPhotoModal(imgUrl, sales, toko) {
      const modal = document.getElementById('photoModal');
      document.getElementById('modalTitle').innerText = `Visit: ${sales} @ ${toko}`;
      document.getElementById('modalImg').src = imgUrl;
      modal.classList.replace('modal-inactive', 'modal-active');
    }

    function closePhotoModal() {
      document.getElementById('photoModal').classList.replace('modal-active', 'modal-inactive');
    }

    function openMapModal(lokasiRaw, sales, toko) {
      const modal = document.getElementById('mapModal');
      const coords = lokasiRaw.replace(/LAT:|LNG:|\s/g, "");
      const mapUrl = `https://maps.google.com/maps?q=${coords}&z=15&output=embed`;
      
      document.getElementById('mapSubtitle').innerText = `${sales} | ${toko}`;
      document.getElementById('mapFrame').src = mapUrl;
      modal.classList.replace('modal-inactive', 'modal-active');
    }

    function closeMapModal() {
      document.getElementById('mapModal').classList.replace('modal-active', 'modal-inactive');
      document.getElementById('mapFrame').src = "";
    }

    async function callAPI(payload) {
      try {
        const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        return await response.json();
      } catch (err) { return null; }
    }

    async function loadData() {
      const selectedDate = document.getElementById('filterTanggal').value;
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="p-24 text-center"><div class="loading-spin mx-auto"></div></td></tr>';
      
      const [summaryData, logsData] = await Promise.all([
        callAPI({ action: "getSummary", data: selectedDate }),
        callAPI({ action: "getLogs", data: selectedDate })
      ]);

      renderSummary(summaryData);
      renderTable(logsData);

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('dateDisplay').innerText = new Date(selectedDate).toLocaleDateString('id-ID', options);
    }

    function renderSummary(data) {
      const container = document.getElementById('summaryCards');
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-slate-400 text-[10px] font-black p-4 uppercase italic">No summary data found.</p>';
        return;
      }
      container.innerHTML = data.map(s => {
        const persen = s.target > 0 ? Math.round((s.realisasi / s.target) * 100) : 0;
        return `
          <div class="min-w-[260px] bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-200 hover:border-red-200 transition-all">
            <p class="text-red-600 font-black text-[10px] uppercase mb-1 tracking-widest">${s.nama}</p>
            <div class="flex justify-between items-end mb-4">
              <h3 class="text-4xl font-black text-slate-900">${persen}%</h3>
              <p class="text-[9px] font-bold text-slate-400 uppercase italic">Target Hit</p>
            </div>
            <div class="text-[10px] font-bold flex justify-between text-slate-400">
              <span>${s.realisasi} Done</span><span>${s.target} Plan</span>
            </div>
          </div>`;
      }).join('');
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const badge = document.getElementById('totalVisitBadge');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="p-32 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest">Tidak ada record kunjungan</td></tr>';
        badge.innerText = "0 VISIT";
        return;
      }

      badge.innerText = `${data.length} VISIT TERCATAT`;

      tbody.innerHTML = data.map(item => {
        return `
          <tr class="border-b border-slate-50 tr-hover">
            <td class="p-8">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-slate-900 text-white rounded-full flex items-center justify-center font-black text-[10px] uppercase">${item.sales.charAt(0)}</div>
                <p class="font-black text-slate-900 text-[11px] uppercase">${item.sales}</p>
              </div>
            </td>
            <td class="p-8">
              <p class="font-bold text-slate-700 uppercase text-[11px] leading-tight">${item.toko}</p>
            </td>
            <td class="p-8 text-[11px]">
              <span class="font-black text-slate-900">${item.tanggal}</span><br>
              <span class="font-bold text-red-500 uppercase tracking-tighter italic">${item.jam}</span>
            </td>
            <td class="p-8">
              <button onclick="openMapModal('${item.lokasi}', '${item.sales}', '${item.toko}')" class="flex items-center gap-2 group text-left">
                <span class="text-[9px] font-black text-slate-400 uppercase bg-slate-100 group-hover:text-red-600 px-3 py-1.5 rounded-lg border transition-all">
                  Lihat GPS
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300 group-hover:text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
              </button>
            </td>
            <td class="p-8 text-center">
              <button onclick="openPhotoModal('${item.foto}', '${item.sales}', '${item.toko}')" 
                class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black hover:bg-red-600 transition-all uppercase shadow-md active:scale-95 inline-flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                Foto
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
