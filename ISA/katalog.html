<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Digital Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #ffffff; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* Ubah warna background kategori aktif menjadi merah */
        .active-cat { background-color: #dc2626 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="mobile-container flex flex-col shadow-2xl">
        <header class="bg-white/80 backdrop-blur-md p-6 sticky top-0 z-50 border-b border-gray-50">
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tighter mb-4">E-Katalog</h1>
            <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Cari produk..." 
                   class="w-full px-5 py-3 rounded-2xl text-sm bg-gray-100 border-none focus:ring-2 focus:ring-red-500/20 outline-none">
        </header>

        <div class="px-5">
            <div id="category-filter" class="flex overflow-x-auto gap-3 py-4 no-scrollbar"></div>

            <div id="loading" class="grid grid-cols-2 gap-4">
                <div class="space-y-3"><div class="aspect-square rounded-[2rem] skeleton"></div><div class="h-4 w-3/4 rounded skeleton"></div></div>
                <div class="space-y-3"><div class="aspect-square rounded-[2rem] skeleton"></div><div class="h-4 w-3/4 rounded skeleton"></div></div>
            </div>

            <div id="katalog-container" class="grid grid-cols-2 gap-x-4 gap-y-8 pb-10 hidden"></div>

            <div id="loadMoreSection" class="pb-20 text-center hidden">
                <button onclick="loadAll()" class="px-8 py-3 bg-red-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-red-200 active:scale-95 transition-all">
                    Tampilkan Semua Produk
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_7WqeUVKaCm1Fa4QpCmsM4d-g5yTFe9FMs9lhwMkaezyuktEbAJqVABvVQc8ZIsUcYA/exec"; 

        let allData = [];

        async function fetchKatalog() {
            try {
                const response = await fetch(WEB_APP_URL);
                allData = await response.json();
                renderCategories(allData);
                
                const initialData = allData.slice(0, 10);
                renderCards(initialData);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('katalog-container').classList.remove('hidden');
                
                if (allData.length > 10) {
                    document.getElementById('loadMoreSection').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = "<p class='col-span-2 text-center text-red-500'>Koneksi database terputus.</p>";
            }
        }

        function renderCards(data) {
            const container = document.getElementById('katalog-container');
            container.innerHTML = data.map(item => `
                <div class="flex flex-col group transition-all">
                    <div class="relative aspect-[4/5] mb-3 overflow-hidden rounded-[2rem] bg-gray-50 shadow-sm">
                        <img src="${item.link_foto}" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300'">
                    </div>
                    <div class="px-1">
                        <p class="text-[9px] font-bold text-red-500 uppercase mb-1">${item.kategori}</p>
                        <h3 class="text-sm font-bold text-gray-800 line-clamp-2 h-9 leading-tight">${item.nama_barang}</h3>
                        <p class="text-lg font-black text-gray-900 mt-1">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');
        }

        function loadAll() {
            renderCards(allData);
            document.getElementById('loadMoreSection').classList.add('hidden');
        }

        function filterCategory(category, el) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            el.classList.add('active-cat');
            document.getElementById('loadMoreSection').classList.add('hidden');

            const filtered = category === 'Semua' ? allData : allData.filter(item => item.kategori === category);
            renderCards(filtered);
        }

        function filterData() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('loadMoreSection').classList.add('hidden');
            
            const filtered = allData.filter(item => 
                item.nama_barang.toLowerCase().includes(term) || 
                item.kategori.toLowerCase().includes(term)
            );
            renderCards(filtered);
        }

        function renderCategories(data) {
            const container = document.getElementById('category-filter');
            const categories = ['Semua', ...new Set(data.map(item => item.kategori))];
            container.innerHTML = categories.map(cat => `
                <button onclick="filterCategory('${cat}', this)" class="cat-btn whitespace-nowrap px-6 py-2 rounded-xl text-xs font-bold bg-white text-gray-400 border border-gray-100 shadow-sm transition-all">
                    ${cat}
                </button>
            `).join('');
            container.querySelector('.cat-btn').classList.add('active-cat');
        }

        window.onload = fetchKatalog;
    </script>
</body>
</html>
