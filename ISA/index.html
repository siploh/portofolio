<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Irshan Sukses Abadi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0a05;
            --accent-color: #ff8c00;
            --gaming-green: #00ff41;
            --item-width: 120px; 
            --font-game: 'Orbitron', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #3a251a 0%, var(--bg-color) 100%);
            color: white;
            font-family: var(--font-game);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* Update Logo: Lebih Besar & Opacity 60% */
        .logo-container {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 100;
        }

        .logo-container img {
            height: 100px; /* Diperbesar dari sebelumnya */
            width: auto;
            opacity: 0.4; /* Transparansi 60% */
            filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.3));
            transition: opacity 0.3s ease;
        }

        .logo-container img:hover {
            opacity: 1; /* Efek hover agar kembali terang saat disentuh */
        }

        .center-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 140, 0, 0.2), transparent);
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-viewport {
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center; 
            align-items: center;
            height: 350px;
        }

        .menu-track {
            display: flex;
            position: absolute;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            padding: 0;
            margin: 0;
            will-change: transform;
        }

        .menu-item {
            width: var(--item-width);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.5s ease;
            cursor: pointer;
            filter: blur(1px);
        }

        .menu-item.active {
            color: var(--accent-color);
            transform: scale(1.8);
            filter: blur(0) drop-shadow(0 0 25px rgba(255, 140, 0, 0.7));
            z-index: 10;
        }

        .menu-info {
            position: absolute;
            bottom: 25%;
            text-align: center;
            width: 100%;
        }

        #menuTitle {
            font-size: 3.2rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.8);
        }

        .controls-hint {
            position: absolute;
            bottom: 85px;
            font-size: 0.75rem;
            color: #888;
            display: flex;
            gap: 30px;
            letter-spacing: 3px;
        }

        .controls-hint span {
            border: 1px solid #444;
            padding: 6px 18px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
        }

        .footer-credit {
            position: absolute;
            bottom: 25px;
            font-size: 0.9rem;
            color: var(--gaming-green);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 10px var(--gaming-green), 0 0 20px rgba(0, 255, 65, 0.5);
            opacity: 0.8;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.6; transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="sndMove" src="audio/move.mp3" preload="auto"></audio>
    <audio id="sndSelect" src="audio/select.mp3" preload="auto"></audio>

    <div class="logo-container">
        <img src="img/logo.png" alt="Logo">
    </div>

    <div class="center-line"></div>

    <div class="container">
        <div class="menu-viewport">
            <div class="menu-track" id="menuTrack">
                <div class="menu-item" data-name="Admin" data-url="Admin.html"><i class="fas fa-user-shield"></i></div>
                <div class="menu-item" data-name="Master Data" data-url="Master.html"><i class="fas fa-database"></i></div>
                <div class="menu-item" data-name="Stock Opname" data-url="SO.html"><i class="fas fa-boxes-stacked"></i></div>
                <div class="menu-item" data-name="Taking Order" data-url="TO.html"><i class="fas fa-file-invoice-dollar"></i></div>
                <div class="menu-item" data-name="Loading List" data-url="Loading_List.html"><i class="fas fa-truck-loading"></i></div>
                <div class="menu-item" data-name="E-Katalog" data-url="Admin_Katalog.html"><i class="fas fa-list-ul"></i></i></div>
                <div class="menu-item" data-name="User" data-url="User.html"><i class="fas fa-users-gear"></i></div>
                <div class="menu-item" data-name="Setting" data-url="#"><i class="fas fa-sliders"></i></div>
            </div>
        </div>

        <div class="menu-info">
            <h1 id="menuTitle">ADMIN</h1>
        </div>

        <div class="controls-hint">
            <span><i class="fas fa-arrow-left"></i> <i class="fas fa-arrow-right"></i> NAVIGATION</span>
            <span>ENTER SELECT</span>
        </div>

        <div class="footer-credit">
            By Bawah Tangga Production
        </div>
    </div>

    <script>
        const track = document.getElementById('menuTrack');
        const items = document.querySelectorAll('.menu-item');
        const titleEl = document.getElementById('menuTitle');
        const sndMove = document.getElementById('sndMove');
        const sndSelect = document.getElementById('sndSelect');
        
        const itemFullWidth = 120;
        let currentIndex = 0;

        function playSfx(audioObj) {
            audioObj.currentTime = 0;
            audioObj.play().catch(e => {});
        }

        function updateMenu(isInitial = false) {
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });

            const offset = -(currentIndex * itemFullWidth);
            track.style.transform = `translateX(${offset}px)`;

            if(!isInitial) playSfx(sndMove);

            titleEl.style.opacity = 0;
            setTimeout(() => {
                titleEl.innerText = items[currentIndex].getAttribute('data-name');
                titleEl.style.opacity = 1;
            }, 150);
        }

        function navigateToPage() {
            playSfx(sndSelect);
            const url = items[currentIndex].getAttribute('data-url');
            titleEl.style.transform = "scale(1.1)";
            setTimeout(() => {
                if(url) window.location.href = url;
            }, 400);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentIndex < items.length - 1) {
                currentIndex++;
                updateMenu();
            } else if (e.key === 'ArrowLeft' && currentIndex > 0) {
                currentIndex--;
                updateMenu();
            } else if (e.key === 'Enter') {
                navigateToPage();
            }
        });

        items.forEach((item, index) => {
            item.addEventListener('click', () => {
                if (currentIndex === index) {
                    navigateToPage();
                } else {
                    currentIndex = index;
                    updateMenu();
                }
            });
        });

        updateMenu(true);
    </script>
</body>
</html>
