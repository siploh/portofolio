<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Username</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { display: flex; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 850px; width: 90%; }
        .banner-section { flex: 1; position: relative; background: #f8f9fa; aspect-ratio: 1 / 1; overflow: hidden; }
        .banner-section img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .login-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        h2 { margin-bottom: 10px; color: #222; font-weight: 600; text-align: center; }
        p.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; outline: none; font-size: 18px; transition: 0.3s; text-align: center; font-weight: bold; }
        input:focus { border-color: #2c3e50; }
        button { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1a252f; transform: translateY(-2px); }
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .banner-section { aspect-ratio: auto; height: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="banner-section">
            <img src="img/iklan.jpeg" alt="Banner">
        </div>

        <div class="login-section">
            <h2>Masuk Sistem</h2>
            <p class="subtitle">Masukkan Username Anda</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="*****" required autofocus>
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.innerText = "Memproses...";
            submitBtn.disabled = true;

            // Logika Pengalihan
            if (user === "Rizki") {
                window.location.href = 'https://bawahtangga.web.id/UD_Rizki_Rizka/';
            } else if (user === "YBCI") {
                window.location.href = 'https://ybci.org';
            } else if (user === "Premium") {
                window.location.href = 'https://bawahtangga.web.id/Premium_Bakery';
            } else {
                alert("⚠️ Username tidak ditemukan!");
                submitBtn.innerText = "Login";
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
