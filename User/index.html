<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { display: flex; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 850px; width: 90%; position: relative; }
        
        .banner-section { flex: 1; position: relative; background: #f8f9fa; aspect-ratio: 1 / 1; overflow: hidden; }
        .banner-section img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .login-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        
        /* Tombol Refresh */
        #refreshBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            color: #ccc;
            transition: 0.3s;
            padding: 5px;
            line-height: 1;
        }
        #refreshBtn:hover { color: #2c3e50; transform: rotate(180deg); }

        h2 { margin-bottom: 10px; color: #222; font-weight: 600; text-align: center; }
        p.subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        
        input { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; 
            outline: none; font-size: 18px; transition: 0.3s; text-align: center; 
            font-weight: bold; 
        }
        input:focus { border-color: #2c3e50; }
        input:disabled { background: #f1f1f1; cursor: not-allowed; }

        button#submitBtn { 
            width: 100%; padding: 15px; background: #2c3e50; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; 
            font-size: 16px; transition: 0.3s; margin-top: 10px; 
        }
        button#submitBtn:hover:not(:disabled) { background: #1a252f; transform: translateY(-2px); }
        button#submitBtn:disabled { background: #95a5a6; cursor: wait; }
        
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .banner-section { aspect-ratio: auto; height: 250px; }
            .login-section { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Banner -->
        <div class="banner-section">
            <img src="img/iklan.jpeg" alt="Banner">
        </div>

        <!-- Form Login -->
        <div class="login-section">
            <button id="refreshBtn" title="Refresh Halaman" onclick="location.reload()">&#x21bb;</button>
            
            <h2>Masuk Sistem</h2>
            <p class="subtitle">Masukkan Username Anda</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="*****" required autofocus>
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>
        </div>
    </div>

    <script>
        // Fungsi untuk mengembalikan tombol ke kondisi awal
        function resetFormState() {
            const submitBtn = document.getElementById('submitBtn');
            const usernameInput = document.getElementById('username');
            
            submitBtn.innerText = "Login";
            submitBtn.disabled = false;
            usernameInput.disabled = false;
            usernameInput.value = '';
            usernameInput.focus();
        }

        // Memastikan tombol aktif saat halaman dimuat/kembali (Back)
        window.addEventListener('pageshow', function(event) {
            resetFormState();
        });

        // Proses Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const usernameInput = document.getElementById('username');
            
            submitBtn.innerText = "Memproses...";
            submitBtn.disabled = true;
            usernameInput.disabled = true;

            // Logika Pengalihan
            if (user === "Rizki") {
                window.location.href = 'https://bawahtangga.web.id/UD_Rizki_Rizka/';
            } else if (user === "Cafe") {
                window.location.href = 'https://bawahtangga.web.id/demo/W-CAFE';
            } else if (user === "Rizka") {
                window.location.href = 'https://bawahtangga.web.id/W-Egg';
            } else if (user === "Demo") {
                window.location.href = 'https://bawahtangga.web.id/demo/W-POS';
            } else if (user === "Laundry") {
                window.location.href = 'https://bawahtangga.web.id/demo/W-Laundry';
            } else if (user === "AzLink") {
                window.location.href = 'https://bawahtangga.web.id/AzLink';
            } else if (user === "Premium") {
                window.location.href = 'https://bawahtangga.web.id/Premium_Bakery';
            } else {
                alert("⚠️ Username tidak ditemukan!");
                resetFormState();
            }
        });
    </script>

</body>
</html>
