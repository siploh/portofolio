<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sistem - Multi Role</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 850px;
            width: 90%;
        }
        /* Sisi Kiri: Banner */
        .banner-section {
            flex: 1;
            position: relative;
            background: #f8f9fa;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .banner-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Sisi Kanan: Form */
        .login-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 { 
            margin-bottom: 10px; 
            color: #222;
            font-weight: 600;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px; 
            color: #777; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            font-size: 18px;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 5px;
            font-weight: bold;
        }
        input:focus { border-color: #2c3e50; }
        input:disabled { background: #f1f1f1; cursor: not-allowed; }

        button {
            width: 100%;
            padding: 15px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) { background: #1a252f; transform: translateY(-2px); }
        button:disabled { background: #95a5a6; cursor: wait; }

        /* Responsif */
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .banner-section { aspect-ratio: auto; height: 250px; }
            .login-section { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="banner-section">
            <img src="img/iklan.jpeg" alt="Banner">
        </div>

        <div class="login-section">
            <h2>Masuk Sistem</h2>
            <p class="subtitle">Demo</p>
            
            <form id="accessForm">
                <div class="form-group">
                    <label>Masukkan Kode Akses</label>
                    <input type="password" id="accessCode" placeholder="···" required autofocus>
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw-MlwzfQx17oTWXxcBsYXPvYZvDOXTWePrgyR4I7a11tRVkWPuQGsWZc2PiFlDZFoA/exec';

        document.getElementById('accessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const codeInput = document.getElementById('accessCode');
            const submitBtn = document.getElementById('submitBtn');
            const codeValue = codeInput.value;

            submitBtn.innerText = "Memverifikasi...";
            submitBtn.disabled = true;
            codeInput.disabled = true;

            fetch(`${scriptURL}?code=${encodeURIComponent(codeValue)}`)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        // Logika Pengalihan Berdasarkan Role
                        const role = data.role.toLowerCase(); // Normalisasi teks ke huruf kecil

                        if (role === "admin") {
                            window.location.href = 'dashboard.html';
                        } 
                        else if (role === "kasir") {
                            window.location.href = 'dashboard_karyawan.html';
                        } 
                        else if (role === "waiter") {
                            // Mengarah ke absensi waiters dan Run sesuai permintaan
                            window.location.href = 'dashboard_waiters.html'; 
                        } 
                        else if (role === "dapur") {
                            // Mengarah ke absensi dapur sesuai permintaan
                            window.location.href = 'dashboard_dapur.html';
                        }
                        else {
                            alert("⚠️ Role '" + data.role + "' tidak dikenali oleh sistem.");
                            resetForm();
                        }
                    } else {
                        alert("⚠️ Kode Akses Salah atau Tidak Terdaftar!");
                        resetForm();
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("❌ Gagal terhubung ke database. Cek koneksi internet atau URL Script.");
                    resetForm();
                });
        });

        function resetForm() {
            const codeInput = document.getElementById('accessCode');
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.innerText = "Login";
            submitBtn.disabled = false;
            codeInput.disabled = false;
            codeInput.value = '';
            codeInput.focus();
        }
    </script>
</body>
</html>
