<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bawah Tangga Production - Tablet Optimized</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ps5-accent: #0072ce;
            --ps5-glow: rgba(0, 114, 206, 0.4);
            /* Ukuran Default (Desktop) */
            --item-w: 160px; 
            --item-h: 240px;
            --item-gap: 20px;
        }

        /* Penyesuaian untuk Tablet (Tab) */
        @media (max-width: 1024px) {
            :root {
                --item-w: 130px;
                --item-h: 195px;
                --item-gap: 15px;
            }
            #menuTitle { font-size: 2.2rem !important; letter-spacing: 5px !important; }
            .controls { right: 30px !important; bottom: 20px !important; gap: 10px !important; }
            .subtitle { font-size: 0.7rem !important; letter-spacing: 6px !important; }
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        /* Background Layer */
        #bgImage {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -3; filter: brightness(1.1) contrast(1.1); 
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -2;
        }

        #particleCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .container {
            flex: 1; display: grid;
            grid-template-rows: 10% 15% 50% 25%; 
            align-items: center; position: relative; z-index: 1;
        }

        .menu-row-area {
            grid-row: 3; width: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .menu-track {
            display: flex; position: absolute;
            transition: transform 0.6s cubic-bezier(0.15, 1, 0.3, 1);
        }

        .menu-item {
            width: var(--item-w); height: var(--item-h);
            margin: 0 var(--item-gap);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s cubic-bezier(0.15, 1, 0.3, 1);
            opacity: 0.5; transform: scale(0.85);
            backdrop-filter: blur(8px); position: relative;
        }

        .menu-item.active {
            opacity: 1; transform: scale(1.15);
            border: 3px solid white; background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); z-index: 10;
        }

        .menu-item i { font-size: 3rem; color: white; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

        /* popup adjustments for touch */
        .user-popup {
            position: absolute; left: 110%; top: 50%;
            transform: translateY(-50%); display: none; 
            flex-direction: column; gap: 10px;
            padding-left: 15px; z-index: 100;
        }

        .user-popup.show { display: flex; }

        .popup-option {
            display: flex; align-items: center;
            text-decoration: none; color: white;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; width: 200px;
            padding: 12px 18px; transition: all 0.3s;
            backdrop-filter: blur(15px); opacity: 0;
            transform: translateY(-10px);
        }

        .user-popup.show .popup-option { animation: slideDown 0.4s forwards; }
        @keyframes slideDown { to { opacity: 0.8; transform: translateY(0); } }

        .popup-option.selected {
            opacity: 1 !important; background: var(--ps5-accent);
            border-color: white; transform: scale(1.05);
        }

        .popup-option i { font-size: 1.5rem; margin-right: 12px; width: 30px; text-align: center; }
        .popup-option span { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }

        .info-row-area { grid-row: 4; text-align: center; align-self: start; padding-top: 10px; }
        #menuTitle { font-size: 3rem; font-weight: 800; letter-spacing: 8px; text-transform: uppercase; margin: 0; }
        .subtitle { color: var(--ps5-accent); letter-spacing: 10px; font-size: 0.8rem; font-weight: bold; }
        
        /* Interactive Controls - Touch Friendly */
        .controls { 
            position: absolute; bottom: 35px; right: 50px; 
            display: flex; gap: 15px; z-index: 1000; 
        }
        
        .control-btn {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; user-select: none;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 30px;
            transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn:active { background: var(--ps5-accent); transform: scale(0.9); }

        .btn-cap { 
            background: white; color: black; 
            padding: 4px 10px; border-radius: 15px; 
            font-size: 0.8rem; font-weight: 900;
        }

        .control-label { font-size: 0.7rem; font-weight: bold; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="bgImage"></div>
    <div class="bg-overlay"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="container">
        <div></div><div></div>

        <div class="menu-row-area">
            <div class="menu-track" id="menuTrack">
                <div class="menu-item" data-name="ADMIN" data-bg="img/admin.jpeg" data-url="Admin.html"><i class="fas fa-user-shield"></i></div>
                <div class="menu-item" data-name="MASTER DATA" data-bg="img/masterdata.jpeg" data-url="Master.html"><i class="fas fa-database"></i></div>
                <div class="menu-item" data-name="STOCK OPNAME" data-bg="img/SO.jpeg" data-url="SO.html"><i class="fas fa-boxes-stacked"></i></div>
                
                <div class="menu-item has-popup" data-name="LOG TRANSAKSI" data-bg="img/TO.jpeg">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <div class="user-popup">
                        <a href="TO.html" class="popup-option"> <i class="fas fa-user"></i> <span>Taking Order</span> </a>
                        <a href="Biaya.html" class="popup-option"> <i class="fas fa-calendar-check"></i> <span>Biaya</span> </a>
                        <a href="dashboardkeuangan.html" class="popup-option"> <i class="fas fa-ellipsis-h"></i> <span>Dashboard</span> </a>
                    </div>
                </div>
                
                <div class="menu-item" data-name="LOADING LIST" data-bg="img/loadinglist.jpeg" data-url="Loading_List.html"><i class="fas fa-truck-loading"></i></div>
                <div class="menu-item" data-name="E-KATALOG" data-bg="img/katalog.jpeg" data-url="Admin_Katalog.html"><i class="fas fa-list-ul"></i></div>
                
                <div class="menu-item has-popup" data-name="USER" data-bg="img/user.jpeg">
                    <i class="fas fa-users-gear"></i>
                    <div class="user-popup">
                        <a href="User.html" class="popup-option"> <i class="fas fa-user"></i> <span>Management</span> </a>
                        <a href="admin_absensi.html" class="popup-option"> <i class="fas fa-calendar-check"></i> <span>Presensi</span> </a>
                    </div>
                </div>

                <div class="menu-item" data-name="BILLING" data-bg="img/Billing.jpeg" data-url="#"><i class="fas fa-sliders"></i></div>
            </div>
        </div>

        <div class="info-row-area">
            <h1 id="menuTitle">ADMIN</h1>
            <div class="subtitle">BAWAH TANGGA PRODUCTION</div>
        </div>

        <div class="controls">
            <div class="control-btn" onclick="moveMenu('left')">
                <span class="btn-cap">←</span>
            </div>
            <div class="control-btn" onclick="moveMenu('right')">
                <span class="btn-cap">→</span>
            </div>
            <div class="control-btn" onclick="moveSub()">
                <span class="btn-cap">↑ ↓</span>
            </div>
            <div class="control-btn" onclick="confirmAction()">
                <span class="btn-cap">OK</span>
            </div>
            <div class="control-btn" onclick="closePopup()">
                <span class="btn-cap">X</span>
            </div>
        </div>
    </div>

    <script>
        // --- PARTICLE & CORE LOGIC (Tetap Sama) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.5; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        const track = document.getElementById('menuTrack');
        const items = document.querySelectorAll('.menu-item');
        const titleEl = document.getElementById('menuTitle');
        const bgImageEl = document.getElementById('bgImage'); 
        
        let currentIndex = 0;
        let subIndex = 0;
        let isPopupOpen = false;

        function updateMenu() {
            // Re-calculate step in case of resize
            const currentStep = items[0].offsetWidth + (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--item-gap')) * 2);
            isPopupOpen = false;
            document.querySelectorAll('.user-popup').forEach(p => p.classList.remove('show'));
            items.forEach((item, index) => { item.classList.toggle('active', index === currentIndex); });
            
            const activeItem = items[currentIndex];
            track.style.transform = `translateX(${-(currentIndex * currentStep)}px)`;
            
            titleEl.style.opacity = 0;
            setTimeout(() => {
                titleEl.innerText = activeItem.getAttribute('data-name');
                titleEl.style.opacity = 1;
            }, 200);

            const bgPath = activeItem.getAttribute('data-bg');
            if (bgPath) bgImageEl.style.backgroundImage = `url('${bgPath}')`;
        }

        function updateSubMenu() {
            const activeItem = items[currentIndex];
            const options = activeItem.querySelectorAll('.popup-option');
            options.forEach((opt, index) => { opt.classList.toggle('selected', index === subIndex); });
        }

        function moveMenu(dir) {
            if (isPopupOpen) return;
            if (dir === 'right' && currentIndex < items.length - 1) { currentIndex++; updateMenu(); }
            else if (dir === 'left' && currentIndex > 0) { currentIndex--; updateMenu(); }
        }

        function moveSub() {
            const activeItem = items[currentIndex];
            if (!isPopupOpen && activeItem.classList.contains('has-popup')) {
                confirmAction();
            } else if (isPopupOpen) {
                const options = activeItem.querySelectorAll('.popup-option');
                subIndex = (subIndex + 1) % options.length;
                updateSubMenu();
            }
        }

        function confirmAction() {
            const activeItem = items[currentIndex];
            const currentPopup = activeItem.querySelector('.user-popup');
            if (!isPopupOpen) {
                if (activeItem.classList.contains('has-popup')) {
                    isPopupOpen = true; subIndex = 0;
                    currentPopup.classList.add('show');
                    updateSubMenu();
                } else {
                    const url = activeItem.getAttribute('data-url');
                    if (url && url !== "#") window.location.href = url;
                }
            } else {
                const options = activeItem.querySelectorAll('.popup-option');
                window.location.href = options[subIndex].getAttribute('href');
            }
        }

        function closePopup() {
            isPopupOpen = false;
            document.querySelectorAll('.user-popup').forEach(p => p.classList.remove('show'));
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveMenu('right');
            if (e.key === 'ArrowLeft') moveMenu('left');
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') moveSub();
            if (e.key === 'Enter') confirmAction();
            if (e.key === 'Escape') closePopup();
        });

        updateMenu();
    </script>
</body>
</html>
