<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Point</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 850px;
            width: 90%;
        }
        /* Sisi Kiri: Banner Kotak (4x4) */
        .banner-section {
            flex: 1;
            position: relative;
            background: #f8f9fa;
            aspect-ratio: 1 / 1; /* Rasio kotak */
            overflow: hidden;
        }
        .banner-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Sisi Kanan: Form Kode */
        .login-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 { 
            margin-bottom: 25px; 
            color: #222;
            font-weight: 600;
            text-align: center;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 13px; 
            color: #777; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            font-size: 18px;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 5px;
            font-weight: bold;
        }
        input:focus { border-color: #2c3e50; }
        button {
            width: 100%;
            padding: 15px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #1a252f; transform: translateY(-2px); }

        /* Responsif: Tumpuk ke bawah di layar kecil */
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .banner-section { aspect-ratio: auto; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- BANNER IKLAN (Kiri) -->
        <div class="banner-section">
            <img src="img/iklan.jpeg" alt="Iklan">
        </div>

        <!-- FORM AKSES (Kanan) -->
        <div class="login-section">
            <h2>Masuk Sistem</h2>
            <form id="accessForm">
                <div class="form-group">
                    <label>Masukkan Kode Akses</label>
                    <!-- Menggunakan type="password" agar karakter menjadi masked (xxx) -->
                    <input type="password" id="accessCode" placeholder="···" required autofocus>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('accessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('accessCode').value;
            
            // Logika verifikasi kode
            if (code === "001") {
                window.location.href = 'dashboard.html';
            } else {
                alert("Kode Akses Salah!");
                document.getElementById('accessCode').value = '';
                document.getElementById('accessCode').focus();
            }
        });
    </script>

</body>
</html>
