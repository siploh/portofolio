<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-body: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- Billing Card --- */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--success));
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .badge {
            display: inline-block;
            background: #dcfce7;
            color: var(--success);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 8px;
        }

        .info-list {
            margin-bottom: 30px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .price-value {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-pay {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-pay:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* --- Pop-up / Modal Style --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px); /* Efek Buram Mewah */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: white;
            width: 90%;
            max-width: 340px;
            padding: 25px;
            border-radius: 28px;
            text-align: center;
            transform: translateY(30px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0) scale(1);
        }

        .modal-box h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .qris-frame {
            background: #f8fafc;
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            margin-bottom: 15px;
        }

        .qris-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        .btn-close {
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-close:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Ringkasan Tagihan</h1>
            <span class="badge"><i class="fa-solid fa-circle-check"></i> Layanan Aktif</span>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-label">No. Tagihan</span>
                <span class="info-value">#INV-202605-001</span>
            </div>
            <div class="info-item">
                <span class="info-label">Total Tagihan</span>
                <span class="info-value price-value">Rp 150.000</span>
            </div>
            <div class="info-item" style="border: none;">
                <span class="info-label">Aktif Sampai</span>
                <span class="info-value">03 Juni 2026</span>
            </div>
        </div>

        <button class="btn-pay" id="openPay">
            <i class="fa-solid fa-qrcode"></i> Bayar Sekarang
        </button>
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal-box">
            <h2>Scan QRIS untuk Bayar</h2>
            <div class="qris-frame">
                <img src="img/Qris.jpeg" alt="QRIS Pembayaran" class="qris-image">
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 20px;">
                Buka aplikasi perbankan atau e-wallet Anda untuk memindai kode di atas.
            </p>
            <button class="btn-close" id="closePay">Tutup</button>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openPay');
        const closeBtn = document.getElementById('closePay');
        const modal = document.getElementById('paymentModal');

        // Fungsi Buka Modal (Pop-up)
        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
        });

        // Fungsi Tutup Modal
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Tutup modal jika user klik di luar kotak modal (di area buram)
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
