<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bawah Tangga Production</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ps5-accent: #0072ce;
            --ps5-glow: rgba(0, 114, 206, 0.4);
            --item-w: 160px; 
            --item-h: 240px;
            --item-gap: 20px;
        }

        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- LAYER GAMBAR LATAR BELAKANG (VERSI TERANG) --- */
        #bgImage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            z-index: -2;
            /* Brightness 0.9 agar gambar terlihat sangat jelas */
            filter: brightness(0.9) contrast(1.05); 
        }

        /* Overlay Gradasi Tipis agar Menu tetap terbaca */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 60%;
            background: radial-gradient(circle, var(--ps5-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: pulseGlow 8s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            flex: 1;
            display: grid;
            grid-template-rows: 15% 15% 45% 25%; 
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Baris Menu */
        .menu-row-area {
            grid-row: 3;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .menu-track {
            display: flex;
            position: absolute;
            transition: transform 0.6s cubic-bezier(0.15, 1, 0.3, 1);
            will-change: transform;
        }

        .menu-item {
            width: var(--item-w);
            height: var(--item-h);
            margin: 0 var(--item-gap);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.15, 1, 0.3, 1);
            opacity: 0.6;
            transform: scale(0.9);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .menu-item.active {
            opacity: 1;
            transform: scale(1.15);
            border: 3px solid white;
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .menu-item i {
            font-size: 3.5rem;
            color: white;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        /* Baris Info */
        .info-row-area {
            grid-row: 4;
            text-align: center;
            align-self: start;
            padding-top: 20px;
        }

        #menuTitle {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.7);
            transition: opacity 0.2s;
        }

        .system-text {
            color: var(--ps5-accent);
            letter-spacing: 8px;
            font-size: 0.8rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 60px;
            display: flex;
            gap: 25px;
            opacity: 0.8;
            font-size: 0.75rem;
        }

        .btn-cap {
            background: white;
            color: black;
            padding: 2px 8px;
            border-radius: 50%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <div id="bgImage"></div>
    <div class="bg-overlay"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="bg-glow"></div>

    <div class="container">
        <div></div> <div></div>

        <div class="menu-row-area">
            <div class="menu-track" id="menuTrack">
                <div class="menu-item" data-name="ADMIN" data-bg="img/admin.jpeg" data-url="Admin.html"><i class="fas fa-user-shield"></i></div>
                <div class="menu-item" data-name="MASTER DATA" data-bg="img/masterdata.jpeg" data-url="Master.html"><i class="fas fa-database"></i></div>
                <div class="menu-item" data-name="STOCK OPNAME" data-bg="img/SO.jpeg" data-url="SO.html"><i class="fas fa-boxes-stacked"></i></div>
                <div class="menu-item" data-name="TAKING ORDER" data-bg="img/TO.jpeg" data-url="TO.html"><i class="fas fa-file-invoice-dollar"></i></div>
                <div class="menu-item" data-name="LOADING LIST" data-bg="img/loadinglist.jpeg" data-url="Loading_List.html"><i class="fas fa-truck-loading"></i></div>
                <div class="menu-item" data-name="E-KATALOG" data-bg="img/katalog.jpeg" data-url="Admin_Katalog.html"><i class="fas fa-list-ul"></i></div>
                <div class="menu-item" data-name="USER SETTING" data-bg="img/user.jpeg" data-url="User.html"><i class="fas fa-users-gear"></i></div>
                <div class="menu-item" data-name="SYSTEM" data-bg="img/system.jpeg" data-url="#"><i class="fas fa-sliders"></i></div>
            </div>
        </div>

        <div class="info-row-area">
            <h1 id="menuTitle">ADMIN</h1>
            <div class="system-text">BAWAH TANGGA PRODUCTION</div>
        </div>

        <div class="controls">
            <span><span class="btn-cap"><</span> <span class="btn-cap">></span> NAVIGASI</span>
            <span><span class="btn-cap">ENTER</span> PILIH</span>
        </div>
    </div>

    <script>
        // Audio Logic
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // Particle Animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Menu & Background Logic
        const track = document.getElementById('menuTrack');
        const items = document.querySelectorAll('.menu-item');
        const titleEl = document.getElementById('menuTitle');
        const bgImageEl = document.getElementById('bgImage'); 
        const step = 160 + (20 * 2); 
        let currentIndex = 0;

        function updateMenu(triggerSound = true) {
            items.forEach((item, index) => {
                item.classList.toggle('active', index === currentIndex);
            });

            const activeItem = items[currentIndex];
            track.style.transform = `translateX(${-(currentIndex * step)}px)`;

            titleEl.style.opacity = 0;
            setTimeout(() => {
                titleEl.innerText = activeItem.getAttribute('data-name');
                titleEl.style.opacity = 1;
            }, 150);

            // Ganti Background Path
            const bgPath = activeItem.getAttribute('data-bg');
            if (bgPath) {
                bgImageEl.style.backgroundImage = `url('${bgPath}')`;
            }

            if (triggerSound) playClickSound();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentIndex < items.length - 1) { currentIndex++; updateMenu(); }
            else if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateMenu(); }
            else if (e.key === 'Enter') { window.location.href = items[currentIndex].getAttribute('data-url'); }
        });

        items.forEach((item, index) => {
            item.addEventListener('click', () => { currentIndex = index; updateMenu(); });
        });

        updateMenu(false);
    </script>
</body>
</html>
