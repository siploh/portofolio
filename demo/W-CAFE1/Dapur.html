<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dapur</title>
  <link rel="icon" href="img/logo.png">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Floating button kanan bawah */
    .btn-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;

      width: 55px;
      height: 55px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: #0d6efd;
      color: white;
      text-decoration: none;

      font-size: 22px;
      font-weight: bold;

      border-radius: 50%;

      box-shadow: 0 10px 25px rgba(0,0,0,0.3);

      transition: all 0.25s ease;
    }

    .btn-float:hover {
      transform: scale(1.1);
      background: #0b5ed7;
    }

    .btn-float:active {
      transform: scale(0.95);
    }

    /* Tooltip kecil */
    .btn-float::after {
      content: "Dashboard";
      position: absolute;

      right: 65px;
      bottom: 50%;

      transform: translateY(50%);

      background: rgba(0,0,0,0.75);
      color: white;

      padding: 5px 10px;
      border-radius: 6px;

      font-size: 12px;
      font-family: Arial, sans-serif;
      white-space: nowrap;

      opacity: 0;
      visibility: hidden;

      transition: 0.2s;
    }

    .btn-float:hover::after {
      opacity: 1;
      visibility: visible;
    }

    /* Mobile adjustment */
    @media (max-width: 768px) {
      .btn-float {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }

      .btn-float::after {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Iframe Google Apps Script -->
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbwe17b05_xgG_e7pGaMfvboD0SE0SaYJGKsU9bmm1Sg3yN0U5dy4HGGg1v43uc1mH4/exec?page=Dapur"
      scrolling="yes"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>

  <!-- Tombol kembali -->
  <a href="dashboard.html" class="btn-float" title="Kembali ke Dashboard">
    ←
  </a>

</body>
</html>
